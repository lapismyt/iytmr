  help:
    title: "<b>Мин YouTube'тан музыка йөкләү өчен инлайн-бот</b>\n\nМине куллану өчен, языгыз <code>@%{bot_username} [трек исеме]</code> кертү кырына.\n\nСез бот статистикасын командасы белән карый аласыз /stats."
  stats:
    title: "<b>Статистика:</b>\n\nБарлыгы кулланучылар: %{total_users}\nАй эчендә актив кулланучылар: %{monthly_active_users}\nЙөкләнгән файллар: %{downloaded_files}\nКәшләнгән видеолар: %{cached_videos}\nБарлыгы йөкләүләр: %{total_downloads}\nСезнең йөкләүләр: %{your_downloads}\nТеркәлү датасы: %{register_date}"
  inline:

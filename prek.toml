[[repos]]
repo = "builtin"
hooks = [
  { id = "check-yaml" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
  { id = "check-added-large-files" },
  { id = "check-toml" },
  { id = "detect-private-key" }
]

[[repos]]
repo = "https://github.com/doublify/pre-commit-rust"
rev = "master"
hooks = [
    {
        id = "fmt",
        args = ["--all", "--", "--check"]
    },
    {
        id = "cargo-check",
    },
    # {
    #     id = "clippy",
    #     args = ["--all-targets", "--all-features", "--", "-D", "warnings"]
    # },

]

